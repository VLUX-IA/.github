<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="328" viewBox="0 0 1280 328" role="img" aria-labelledby="title desc">
  <title id="title">VLUX — AI Transformation Partner</title>
  <desc id="desc">Encabezado horizontal corporativo de VLUX en fondo negro metálico.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#030507"/>
      <stop offset="0.45" stop-color="#111820"/>
      <stop offset="0.7" stop-color="#222B33"/>
      <stop offset="1" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06090D"/>
      <stop offset="0.52" stop-color="#151D24"/>
      <stop offset="0.82" stop-color="#2B343B"/>
      <stop offset="1" stop-color="#070A0E"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6FCFF"/>
      <stop offset="0.35" stop-color="#87F2FF"/>
      <stop offset="0.72" stop-color="#55CFE8"/>
      <stop offset="1" stop-color="#DDF9FF"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="smallGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="328" fill="#030507"/>
  <rect y="0" width="1280" height="328" fill="url(#bg)"/>
  <rect y="6" width="1280" height="316" fill="url(#panel)" opacity="0.88"/>

  <g opacity="0.32">
    <line x1="0" y1="8" x2="1280" y2="8" stroke="#E8F8FF" stroke-width="1"/>
    <line x1="0" y1="32" x2="1280" y2="32" stroke="#1A232A"/>
    <line x1="0" y1="54" x2="1280" y2="54" stroke="#27323A"/>
    <line x1="0" y1="76" x2="1280" y2="76" stroke="#182027"/>
    <line x1="0" y1="98" x2="1280" y2="98" stroke="#2A353D"/>
    <line x1="0" y1="120" x2="1280" y2="120" stroke="#12191F"/>
    <line x1="0" y1="142" x2="1280" y2="142" stroke="#263039"/>
    <line x1="0" y1="164" x2="1280" y2="164" stroke="#151D23"/>
    <line x1="0" y1="186" x2="1280" y2="186" stroke="#2B343C"/>
    <line x1="0" y1="208" x2="1280" y2="208" stroke="#141B21"/>
    <line x1="0" y1="230" x2="1280" y2="230" stroke="#29343D"/>
    <line x1="0" y1="252" x2="1280" y2="252" stroke="#161D23"/>
    <line x1="0" y1="274" x2="1280" y2="274" stroke="#303A42"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#0B1015" stroke-width="2"/>
  </g>

  <g opacity="0.2">
    <rect x="120" y="34" width="980" height="242" fill="#000" opacity="0.18"/>
    <path d="M105 18 H1175" stroke="#D9F7FF" stroke-width="1" opacity="0.45"/>
    <path d="M95 306 H1165" stroke="#0D1116" stroke-width="2" opacity="0.8"/>
  </g>

  <g transform="translate(226 72)" filter="url(#softGlow)">
    <path d="M0 0 L78 168 L156 0" fill="none" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <path d="M22 24 L78 128 L134 24" fill="none" stroke="#EAFBFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <path d="M39 39 L78 102 L118 39" fill="none" stroke="#25313A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <path d="M0 0 L78 168 L156 0" fill="none" stroke="#2BD9FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" filter="url(#smallGlow)">
    <text x="738" y="166" text-anchor="middle" fill="url(#cyan)" font-size="92" font-weight="300" letter-spacing="46">VLUX</text>
    <text x="744" y="222" text-anchor="middle" fill="#BFEFFF" font-size="24" font-weight="300" letter-spacing="12">AI TRANSFORMATION PARTNER</text>
  </g>

  <rect x="0" y="0" width="1280" height="328" fill="none" stroke="#172028" stroke-width="2"/>
</svg>
